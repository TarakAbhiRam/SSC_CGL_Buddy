name: Build macOS App

on:
  push:
    tags: ["v*"]
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.10.0

      - name: Build app
        run: bash build/build_mac.sh

      - name: Zip distributable
        run: ditto -c -k --sequesterRsrc --keepParent "dist/CGL Buddy" CGL_Buddy_macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CGL_Buddy_macOS
          path: CGL_Buddy_macOS.zip
          retention-days: 30
