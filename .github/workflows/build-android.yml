name: Build Android APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: mobile
        run: |
          node --version
          npm --version
          npm ci --engine-strict

      - name: Build and sync mobile web assets
        working-directory: mobile
        run: npm run sync

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Verify mobile Android SDK policy
        run: |
          grep -q "node-version: \"22.13.0\"" .github/workflows/build-android.yml
          grep -q "java-version: \"21\"" .github/workflows/build-android.yml
          grep -q "gradle-8.14.3-all.zip" mobile/android/gradle/wrapper/gradle-wrapper.properties
          grep -q "com.android.tools.build:gradle:8.13.0" mobile/android/build.gradle
          grep -q "minSdkVersion = 28" mobile/android/variables.gradle
          grep -q "targetSdkVersion = 36" mobile/android/variables.gradle
          grep -q "compileSdkVersion = 36" mobile/android/variables.gradle
          grep -q "JavaVersion.VERSION_21" mobile/android/app/capacitor.build.gradle

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --warning-mode all

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CGL_Buddy_Android_Debug_APK
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
